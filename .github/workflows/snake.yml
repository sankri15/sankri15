name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      # Generates the snake
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: sankri15
          # Add github_token to help fetch exact data. Note: For private repos, a Personal Access Token (PAT) is required.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # These output files will be created in the build
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Push the newly generated snake SVGs to a new branch called "output"
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
